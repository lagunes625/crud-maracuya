<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Enfermedades Maracuyá</title>
    <style>
        :root {
            --maracuya: #f6c90e;
            --maracuya-dark: #d99a00;
            --verde: #2f7d32;
            --verde-oscuro: #1f5f25;
            --morado: #5b2f8f;
            --fondo: #f5f8ef;
            --texto: #263238;
            --borde: rgba(47, 125, 50, 0.18);
            --sombra: 0 20px 45px rgba(31, 95, 37, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--texto);
            background:
                radial-gradient(circle at top left, rgba(246, 201, 14, 0.35), transparent 32%),
                radial-gradient(circle at bottom right, rgba(91, 47, 143, 0.18), transparent 30%),
                linear-gradient(135deg, #f8fbf2 0%, #eef7e6 45%, #fff8db 100%);
            padding: 40px 18px;
        }

        .container {
            width: min(980px, 100%);
            margin: 0 auto;
        }

        .hero {
            text-align: center;
            margin-bottom: 28px;
        }

        .hero h1 {
            margin: 0;
            color: var(--verde-oscuro);
            font-size: clamp(2rem, 5vw, 3.2rem);
            letter-spacing: -0.04em;
        }

        .hero p {
            margin: 12px 0 0;
            color: #5f6f52;
            font-size: 1.05rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid var(--borde);
            border-radius: 28px;
            box-shadow: var(--sombra);
            padding: clamp(24px, 5vw, 42px);
            backdrop-filter: blur(10px);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            color: var(--verde-oscuro);
            font-weight: 700;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            border: 2px solid #dce7cf;
            border-radius: 16px;
            padding: 14px 16px;
            font-size: 1rem;
            color: var(--texto);
            background: #fbfdf8;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
        }

        input:focus {
            border-color: var(--maracuya-dark);
            box-shadow: 0 0 0 4px rgba(246, 201, 14, 0.22);
            transform: translateY(-1px);
        }

        .actions {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-top: 26px;
        }

        button {
            border: none;
            border-radius: 16px;
            padding: 14px 16px;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            background: linear-gradient(135deg, var(--verde), var(--verde-oscuro));
            box-shadow: 0 10px 20px rgba(31, 95, 37, 0.2);
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
        }

        button:nth-of-type(2) {
            background: linear-gradient(135deg, var(--maracuya), var(--maracuya-dark));
            color: #3a2b00;
        }

        button:nth-of-type(3) {
            background: linear-gradient(135deg, var(--morado), #7b3fb8);
        }

        button:nth-of-type(4) {
            background: linear-gradient(135deg, #d64545, #a92020);
        }

        button:nth-of-type(5) {
            background: linear-gradient(135deg, #2f80ed, #1f5f25);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 26px rgba(31, 95, 37, 0.28);
            filter: saturate(1.08);
        }

        button:active {
            transform: translateY(0);
        }

        .results {
            margin-top: 32px;
            background: #ffffff;
            border: 1px solid var(--borde);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 14px 32px rgba(31, 95, 37, 0.12);
        }

        .results h2 {
            margin: 0 0 18px;
            color: var(--verde-oscuro);
            font-size: 1.45rem;
        }

        #resultado {
            color: var(--texto);
            line-height: 1.6;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }

        #resultado:empty::before {
            content: 'Los resultados aparecerán aquí.';
            color: #7d8b72;
        }

        #resultado table {
            width: 100%;
            border-collapse: collapse;
            overflow: hidden;
            border-radius: 16px;
            background: #ffffff;
        }

        #resultado th,
        #resultado td {
            border: 1px solid #e1ead8;
            padding: 14px 16px;
            text-align: left;
            vertical-align: top;
        }

        #resultado th {
            color: #ffffff;
            background: linear-gradient(135deg, var(--verde), var(--verde-oscuro));
            font-weight: 800;
        }

        #resultado tr:nth-child(even) {
            background: #f7fbf2;
        }

        #resultado tr:hover {
            background: #fff9d6;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        @media (max-width: 820px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .actions {
                grid-template-columns: 1fr 1fr;
            }

            .actions button:last-child {
                grid-column: 1 / -1;
            }
        }

        @media (max-width: 520px) {
            body {
                padding: 24px 12px;
            }

            .card,
            .results {
                border-radius: 20px;
            }

            .actions {
                grid-template-columns: 1fr;
            }

            .actions button:last-child {
                grid-column: auto;
            }
        }
    </style>
</head>

<body>
    <main class="container">
        <section class="hero">
            <h1>CRUD Enfermedades del Maracuyá</h1>
            <p>Gestiona la información agrícola de forma clara, rápida y moderna.</p>
        </section>

        <section class="card">
            <div class="form-grid">
                <div class="field">
                    <label for="id">ID</label>
                    <input type="number" id="id" placeholder="Ejemplo: 1" autocomplete="off">
                </div>

                <div class="field">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" placeholder="Nombre de la enfermedad" autocomplete="off">
                </div>

                <div class="field">
                    <label for="descripcion">Descripción</label>
                    <input type="text" id="descripcion" placeholder="Descripción breve" autocomplete="off">
                </div>
            </div>

            <div class="actions">
                <button onclick="agregarEnfermedad()">Agregar</button>
                <button onclick="buscarEnfermedad()">Buscar</button>
                <button onclick="modificarEnfermedad()">Modificar</button>
                <button onclick="eliminarEnfermedad()">Eliminar</button>
                <button onclick="listarEnfermedades()">Listar</button>
            </div>
        </section>

        <section class="results">
            <h2>Resultados</h2>
            <div id="resultado"></div>
        </section>
    </main>

    <script>
        function agregarEnfermedad() {

            fetch('http://127.0.0.1:5000/enfermedades', {

                method: 'POST',

                headers: {
                    'Content-Type': 'application/json'
                },

                body: JSON.stringify({

                    id: document.getElementById('id').value,

                    nombre: document.getElementById('nombre').value,

                    descripcion: document.getElementById('descripcion').value
                })

            })

                .then(response => response.json())
                .then(data => alert(data.mensaje));
        }

        function listarEnfermedades() {

            fetch('http://127.0.0.1:5000/enfermedades')

                .then(response => response.json())

                .then(data => {

                    let tabla = `
                    <div class="table-wrapper">
                    <table border="1" cellpadding="8">
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Descripción</th>
                        </tr>
                    `;

                    data.forEach(enfermedad => {

                        tabla += `
                        <tr>
                            <td>${enfermedad.id}</td>
                            <td>${enfermedad.nombre}</td>
                            <td>${enfermedad.descripcion}</td>
                        </tr>
                        `;

                    });

                    tabla += "</table></div>";

                    document.getElementById('resultado').innerHTML = tabla;

                });

        }



        function buscarEnfermedad() {

            let id = document.getElementById('id').value;
            let nombre = document.getElementById('nombre').value;

            let url = '';

            if (id !== '') {

                url = 'http://127.0.0.1:5000/enfermedades/' + id;

            } else if (nombre !== '') {

                url = 'http://127.0.0.1:5000/enfermedades/nombre/' + nombre;

            } else {

                alert('Ingresa un ID o un nombre');
                return;
            }

            fetch(url)

                .then(response => response.json())

                .then(data => {

                    document.getElementById('resultado').innerHTML =
                        JSON.stringify(data, null, 2);

                });

        }


        function modificarEnfermedad() {

            let id = document.getElementById('id').value;

            fetch('http://127.0.0.1:5000/enfermedades/' + id, {

                method: 'PUT',

                headers: {
                    'Content-Type': 'application/json'
                },

                body: JSON.stringify({

                    nombre: document.getElementById('nombre').value,

                    descripcion: document.getElementById('descripcion').value
                })

            })

                .then(response => response.json())
                .then(data => alert(data.mensaje));
        }



        function eliminarEnfermedad() {

            let id = document.getElementById('id').value;

            fetch('http://127.0.0.1:5000/enfermedades/' + id, {

                method: 'DELETE'

            })

                .then(response => response.json())
                .then(data => alert(data.mensaje));

        }

    </script>

</body>
</html>
